name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle Wrapper
        # Мы принудительно используем версию 7.5, чтобы избежать ошибок Gradle 9+
        run: gradle wrapper --gradle-version 7.5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # Сборка APK. Параметр --stacktrace поможет увидеть детали, если что-то пойдет не так
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: touch-lock-app
          path: app/build/outputs/apk/debug/app-debug.apk
          
