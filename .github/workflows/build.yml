name: Android CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        # Это официальный инструмент, который сам скачает нужную версию Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5

      - name: Build with Gradle
        # Мы вызываем gradle напрямую, минуя обертку gradlew, которой у нас нет
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: touch-lock-app
          path: app/build/outputs/apk/debug/app-debug.apk
          
